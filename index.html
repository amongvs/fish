<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OurChat Group</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- PeerJS for P2P Calling -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        /* Premium UI animations and scrollbar tweaks */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.06); }
        .ring-anim { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex justify-center bg-slate-100 text-slate-800">

    <!-- Config (REPLACE WITH YOUR LIVE DEPLOYMENT URL) -->
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuEnrGcpPDFR9vuZgkluvrJnzBSOB0gjTo9ZguNMm8wPXVBmBBbc_AhDSKVuYpbJVugA/exec"; 
    </script>

    <!-- App Container -->
    <div class="w-full max-w-md h-full bg-white relative flex flex-col shadow-2xl overflow-hidden">

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="absolute inset-0 z-50 bg-white flex flex-col items-center justify-center p-6 transition-opacity duration-300">
            <div class="w-24 h-24 bg-slate-200 rounded-full mb-6 relative overflow-hidden shadow-md border-4 border-white group cursor-pointer" onclick="document.getElementById('pfp-input').click()">
                <img id="pfp-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=placeholder" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="ph ph-camera text-white text-2xl"></i>
                </div>
            </div>
            <input type="file" id="pfp-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            
            <h1 class="text-2xl font-bold mb-2">Set Up Profile</h1>
            <p class="text-slate-500 text-sm mb-8 text-center px-4">Create a custom avatar and name. Your image is auto-compressed for cloud performance.</p>
            
            <input type="text" id="username-input" placeholder="Enter your name" class="w-full bg-slate-100 px-5 py-4 rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            <button onclick="saveProfile()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition active:scale-95">Enter Group Chat</button>
        </div>

        <!-- MAIN CHAT SCREEN -->
        <div id="chat-screen" class="flex flex-col h-full hidden relative">
            
            <!-- Header -->
            <header class="glass z-10 px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg">
                        <i class="ph ph-users-three"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg leading-tight">Group Space</h2>
                        <span id="active-members-count" class="text-xs text-slate-400">Loading members...</span>
                    </div>
                </div>
                <button onclick="toggleMembersList()" class="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-200 transition active:scale-90 relative">
                    <i class="ph ph-user-list text-xl"></i>
                    <span id="online-dot-badge" class="absolute top-2 right-2 w-2.5 h-2.5 bg-green-500 rounded-full border border-white hidden"></span>
                </button>
            </header>

            <!-- Active Typing Bar -->
            <div id="typing-indicator" class="bg-slate-50 border-b border-slate-100 px-4 py-1.5 flex items-center gap-2 text-xs text-green-600 font-medium hidden">
                <span id="typing-text">Someone is typing</span>
                <div class="flex gap-0.5"><div class="w-1 h-1 bg-green-600 rounded-full typing-dot"></div><div class="w-1 h-1 bg-green-600 rounded-full typing-dot"></div><div class="w-1 h-1 bg-green-600 rounded-full typing-dot"></div></div>
            </div>

            <!-- Chat Area -->
            <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 flex flex-col">
                <!-- Messages injected here -->
            </main>

            <!-- Input Area -->
            <footer class="p-3 bg-white border-t border-slate-100 pb-safe">
                <div class="flex items-center gap-2 bg-slate-100 p-1.5 rounded-full">
                    <input type="text" id="message-input" placeholder="Message group..." class="flex-1 bg-transparent px-4 py-2 outline-none text-sm" oninput="handleTyping()" onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()" class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-sm hover:bg-blue-700 transition active:scale-90">
                        <i class="ph-fill ph-paper-plane-tilt text-lg"></i>
                    </button>
                </div>
            </footer>

            <!-- SLIDE-OUT MEMBERS LIST DRAWER -->
            <div id="members-drawer" class="absolute inset-y-0 right-0 w-64 bg-white z-40 border-l border-slate-200 shadow-2xl flex flex-col transform translate-x-full transition-transform duration-300">
                <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                    <h3 class="font-bold text-md flex items-center gap-2">
                        <i class="ph ph-circle-wavy-check text-green-500"></i> Members Online
                    </h3>
                    <button onclick="toggleMembersList()" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
                </div>
                <div id="members-list-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                    <!-- Dynamic Member list items go here -->
                </div>
            </div>
            
            <!-- Drawer Backdrop Overlay -->
            <div id="drawer-backdrop" class="absolute inset-0 bg-black/20 z-30 hidden transition-opacity" onclick="toggleMembersList()"></div>
        </div>

        <!-- CALL OVERLAY -->
        <div id="call-overlay" class="absolute inset-0 z-[60] bg-slate-900 text-white flex flex-col items-center justify-between py-20 hidden">
            <!-- Hidden audio streams processed via WebRTC (Invisible but active in DOM) -->
            <audio id="local-audio" autoplay muted playsinline></audio>
            <audio id="remote-audio" autoplay playsinline></audio>

            <div class="flex flex-col items-center mt-10">
                <div class="w-32 h-32 rounded-full overflow-hidden mb-6 ring-anim relative">
                    <img id="call-pfp" src="https://api.dicebear.com/7.x/avataaars/svg?seed=placeholder" class="w-full h-full object-cover">
                </div>
                <h2 id="call-name" class="text-3xl font-bold mb-2">Friend</h2>
                <p id="call-status" class="text-slate-400">Ringing...</p>
            </div>

            <div class="flex gap-8 mb-10">
                <button id="accept-call-btn" onclick="acceptCall()" class="w-16 h-16 rounded-full bg-green-500 flex items-center justify-center shadow-lg hidden active:scale-95 transition">
                    <i class="ph-fill ph-phone text-3xl"></i>
                </button>
                <button onclick="endCall()" class="w-16 h-16 rounded-full bg-red-500 flex items-center justify-center shadow-lg active:scale-95 transition">
                    <i class="ph-fill ph-phone-disconnect text-3xl"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- GLOBAL STATE ---
        let myName = localStorage.getItem('chat_name') || '';
        let myPfp = localStorage.getItem('chat_pfp') || '';
        let peer = null;
        let peerIdString = '';
        let localStream = null;
        let currentCall = null;
        let isTyping = false;
        let typingTimeout;
        let lastMessageCount = 0;
        let pollInterval;
        let activeCallSignal = null;
        let isDrawerOpen = false;
        
        // Cache to store known profile pictures for user list and chat bubbles
        let userDatabase = {};

        // --- ON LOAD ---
        window.onload = () => {
            if (myName) {
                document.getElementById('username-input').value = myName;
                if(myPfp) document.getElementById('pfp-preview').src = myPfp;
            }
        };

        // --- AUTOMATIC IMAGE COMPRESSION ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 100; // Small size for fast Sheets database operation
                    canvas.height = 100;
                    
                    const minSize = Math.min(img.width, img.height);
                    const sx = (img.width - minSize) / 2;
                    const sy = (img.height - minSize) / 2;
                    ctx.drawImage(img, sx, sy, minSize, minSize, 0, 0, 100, 100);
                    
                    myPfp = canvas.toDataURL('image/jpeg', 0.5); // 50% compress
                    document.getElementById('pfp-preview').src = myPfp;
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // --- ENTER SYSTEM ---
        async function saveProfile() {
            myName = document.getElementById('username-input').value.trim();
            if (!myName) return alert("Please enter a name");
            
            // Clean name for WebRTC / sheet parsing
            myName = myName.replace(/[^a-zA-Z0-9 ]/g, '');

            if (!myPfp) {
                myPfp = `https://api.dicebear.com/7.x/avataaars/svg?seed=${myName}`;
            }

            localStorage.setItem('chat_name', myName);
            localStorage.setItem('chat_pfp', myPfp);

            document.getElementById('setup-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
            }, 300);

            initPeer();
        }

        // --- WEB RESPONSE DISPATCHER (CORS Safe) ---
        async function postToSheet(payload) {
            if(!SCRIPT_URL.startsWith('http')) return console.warn("Google Script URL is unconfigured.");
            try {
                // We use 'text/plain' as the Content-Type header. This is a critical hack 
                // to skip standard browser CORS preflight blocks with Google Apps Script.
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error("Transmission error:", err);
                return null;
            }
        }

        // --- UNIFIED POLLING CYCLE ---
        function startPolling() {
            pollData();
            pollInterval = setInterval(pollData, 3000); // Efficient 3s cycle
        }

        async function pollData() {
            // Package active user stats and retrieve group state in one quick action!
            const responseData = await postToSheet({
                action: 'poll',
                sender: myName,
                pfp: myPfp,
                peerId: peerIdString,
                isTyping: isTyping
            });

            if (responseData) {
                renderMessages(responseData.messages);
                processGroupState(responseData.state);
            }
        }

        // --- RENDER GROUP MESSAGES ---
        function renderMessages(messages) {
            if (messages.length === lastMessageCount) return;
            lastMessageCount = messages.length;
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; 
            
            messages.forEach(msg => {
                const isMe = msg.sender === myName;
                
                // --- SAFE TIMESTAMP CONVERSION ---
                let dateObj;
                let tsRaw = msg.timestamp;
                if (!tsRaw) {
                    dateObj = new Date();
                } else if (typeof tsRaw === 'number') {
                    dateObj = new Date(tsRaw);
                } else if (!isNaN(tsRaw)) {
                    dateObj = new Date(Number(tsRaw));
                } else {
                    dateObj = new Date(tsRaw);
                }

                // If conversion fails entirely, default safely to current time
                if (isNaN(dateObj.getTime())) {
                    dateObj = new Date();
                }

                const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                // Pull PFP from user state cache or use dynamic fallback
                const senderPfp = userDatabase[msg.sender + "_pfp"] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.sender}`;
                
                const messageRow = document.createElement('div');
                messageRow.className = `flex w-full gap-2.5 items-end ${isMe ? 'justify-end' : 'justify-start'}`;
                
                messageRow.innerHTML = `
                    ${!isMe ? `<img src="${senderPfp}" class="w-8 h-8 rounded-full border border-slate-200 object-cover shadow-sm mb-4">` : ''}
                    <div class="max-w-[70%]">
                        ${!isMe ? `<span class="text-[10px] font-semibold text-slate-500 ml-1 mb-1 block">${msg.sender}</span>` : ''}
                        <div class="px-4 py-2.5 rounded-2xl ${isMe ? 'bg-blue-600 text-white rounded-br-sm shadow-md' : 'bg-white border border-slate-100 text-slate-800 rounded-bl-sm shadow-sm'}">
                            <p class="leading-relaxed text-[14px] whitespace-pre-wrap break-all">${msg.message}</p>
                        </div>
                        <span class="text-[9px] text-slate-400 mt-1 block ${isMe ? 'text-right mr-1' : 'ml-1'}">${timeStr}</span>
                    </div>
                `;
                chatBox.appendChild(messageRow);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- PROCESS ONLINE LIST, GROUP TYPING & VOICE CALL ALERTS ---
        function processGroupState(state) {
            const now = new Date().getTime();
            const activeUsers = [];
            const typingUsers = [];
            
            // Build temporary cache
            userDatabase = state;

            // Gather metadata of all users registered in the state sheet
            for (const key in state) {
                if (key.endsWith("_lastSeen")) {
                    const user = key.replace("_lastSeen", "");
                    
                    // Safe parsing for numeric user online timestamps
                    let lastSeenTime = Number(state[key]);
                    if (isNaN(lastSeenTime)) {
                        lastSeenTime = new Date(state[key]).getTime() || 0;
                    }

                    const isOnline = (now - lastSeenTime) < 15000; // Online if polled within 15 seconds

                    if (isOnline) {
                        const userPfp = state[user + "_pfp"] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`;
                        const userPeerId = state[user + "_peerId"] || '';
                        
                        activeUsers.push({
                            name: user,
                            pfp: userPfp,
                            peerId: userPeerId
                        });

                        // Check typing
                        if (state[user + "_typing"] === "true" && user !== myName) {
                            typingUsers.push(user);
                        }
                    }
                }
            }

            // Update Member list count header
            document.getElementById('active-members-count').innerText = `${activeUsers.length} member${activeUsers.length === 1 ? '' : 's'} online`;
            
            if (activeUsers.length > 1) {
                document.getElementById('online-dot-badge').classList.remove('hidden');
            } else {
                document.getElementById('online-dot-badge').classList.add('hidden');
            }

            // Build Slideout Drawer
            buildMemberDrawerUI(activeUsers);

            // Update Typing Bar
            const typingBar = document.getElementById('typing-indicator');
            const typingText = document.getElementById('typing-text');
            if (typingUsers.length > 0) {
                typingBar.classList.remove('hidden');
                if (typingUsers.length === 1) {
                    typingText.innerText = `${typingUsers[0]} is typing`;
                } else if (typingUsers.length === 2) {
                    typingText.innerText = `${typingUsers[0]} & ${typingUsers[1]} are typing`;
                } else {
                    typingText.innerText = `Multiple people are typing`;
                }
            } else {
                typingBar.classList.add('hidden');
            }

            // Poll for target calls directed *specifically* to me!
            const myCallSignalKey = `call_to_${myName}`;
            const callSignalRaw = state[myCallSignalKey];
            
            if (callSignalRaw) {
                const callData = JSON.parse(callSignalRaw);
                const timeDiff = now - callData.time;
                
                // Ring screen if call was made within 45s
                if (timeDiff < 45000) {
                    if (!currentCall && !document.getElementById('call-overlay').classList.contains('active-ring')) {
                        triggerCallRinging(callData);
                    }
                }
            } else {
                // Cancel ring screen if active caller disconnected
                if (document.getElementById('call-overlay').classList.contains('active-ring') && !currentCall) {
                    endCallQuietly();
                }
            }
        }

        // --- MEMBER LIST UI GENERATION ---
        function buildMemberDrawerUI(users) {
            const listContainer = document.getElementById('members-list-container');
            listContainer.innerHTML = '';

            users.forEach(user => {
                const isCurrentMe = user.name === myName;
                const memberCard = document.createElement('div');
                memberCard.className = `flex items-center justify-between p-2 rounded-xl transition ${isCurrentMe ? 'bg-slate-50' : 'hover:bg-slate-50'}`;
                
                memberCard.innerHTML = `
                    <div class="flex items-center gap-2.5">
                        <div class="relative w-8 h-8">
                            <img src="${user.pfp}" class="w-full h-full rounded-full object-cover border border-slate-100">
                            <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white"></span>
                        </div>
                        <span class="text-sm font-semibold truncate max-w-[110px]">${user.name} ${isCurrentMe ? '(You)' : ''}</span>
                    </div>
                    ${!isCurrentMe && user.peerId ? `
                        <button onclick="dialFriend('${user.name}', '${user.peerId}')" class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 active:scale-90 transition">
                            <i class="ph-fill ph-phone-call text-md"></i>
                        </button>
                    ` : ''}
                `;
                listContainer.appendChild(memberCard);
            });

            if (users.length <= 1) {
                listContainer.innerHTML = `<div class="text-center text-xs text-slate-400 py-6">Nobody else online yet. Send your friend the link!</div>`;
            }
        }

        function toggleMembersList() {
            isDrawerOpen = !isDrawerOpen;
            const drawer = document.getElementById('members-drawer');
            const backdrop = document.getElementById('drawer-backdrop');
            
            if (isDrawerOpen) {
                drawer.classList.remove('translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                drawer.classList.add('translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        // --- SEND CHAT MESSAGES ---
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            
            // Perceptual Speed: instantly project bubble in local DOM
            const chatBox = document.getElementById('chat-box');
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const tempDiv = document.createElement('div');
            tempDiv.className = 'flex w-full justify-end gap-2.5 items-end';
            tempDiv.innerHTML = `
                <div class="max-w-[70%] opacity-60">
                    <div class="px-4 py-2.5 rounded-2xl bg-blue-600 text-white rounded-br-sm shadow-md">
                        <p class="leading-relaxed text-[14px] whitespace-pre-wrap break-all">${text}</p>
                    </div>
                </div>
            `;
            chatBox.appendChild(tempDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Dispatch message payload to sheet backend
            await postToSheet({ action: 'sendMessage', sender: myName, message: text });
            
            isTyping = false;
        }

        function handleTyping() {
            if (!isTyping) {
                isTyping = true;
            }
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isTyping = false;
            }, 2500);
        }

        // --- P2P WEBRTC VOICE DIAL SYSTEM ---
        function initPeer() {
            // Setup WebRTC using free PeerJS signaling cloud
            peer = new Peer(); 
            peer.on('open', id => {
                peerIdString = id;
                console.log('Connected to P2P network. ID:', id);
                
                // Active polling of sheets starts immediately upon channel initialization
                startPolling();
            });

            peer.on('call', incomingCall => {
                // Safely request/reuse microphone stream instead of creating competing browser processes
                requestMicrophone().then(stream => {
                    if (stream) {
                        localStream = stream;
                        incomingCall.answer(stream);
                        handleActiveCall(incomingCall);
                    } else {
                        console.error("Microphone not available to answer incoming call.");
                        endCall();
                    }
                }).catch(err => {
                    console.error("Audio grab failed:", err);
                    endCall();
                });
            });

            // Handle WebRTC/PeerJS network connectivity or permission failures cleanly
            peer.on('error', err => {
                console.error("PeerJS Client Error:", err);
                const statusEl = document.getElementById('call-status');
                if (statusEl) {
                    statusEl.innerText = `Network issue: ${err.type}`;
                }
            });
        }

        // Safeguards browser microphone threads so they do not request competing channels
        async function requestMicrophone() {
            if (localStream) return localStream;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                localStream = stream; // Cache globally
                
                // Route local microphone stream to muted audio container to keep active
                const localAudio = document.getElementById('local-audio');
                if (localAudio) localAudio.srcObject = stream;
                
                return localStream;
            } catch (err) {
                alert("Microphone permission was denied. Please allow microphone access to initiate calls.");
                return null;
            }
        }

        // Click Call Button next to specific member
        async function dialFriend(friendName, friendPeerId) {
            const stream = await requestMicrophone();
            if (!stream) return;

            // Trigger caller display
            document.getElementById('call-overlay').classList.remove('hidden');
            document.getElementById('call-status').innerText = `Dialing ${friendName}...`;
            document.getElementById('call-name').innerText = friendName;
            document.getElementById('call-pfp').src = userDatabase[friendName + "_pfp"] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${friendName}`;
            document.getElementById('accept-call-btn').classList.add('hidden');

            activeCallSignal = { target: friendName };

            // Post signaling packet specifically targeting this friend
            await postToSheet({ action: 'initiateCall', sender: myName, target: friendName, peerId: peer.id });
        }

        function triggerCallRinging(callData) {
            activeCallSignal = callData;
            
            const overlay = document.getElementById('call-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('active-ring');
            
            document.getElementById('call-status').innerText = "Incoming Call...";
            document.getElementById('call-name').innerText = callData.caller;
            document.getElementById('call-pfp').src = userDatabase[callData.caller + "_pfp"] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${callData.caller}`;
            document.getElementById('accept-call-btn').classList.remove('hidden');
            
            if(navigator.vibrate) navigator.vibrate([400, 300, 400]);
        }

        async function acceptCall() {
            if(navigator.vibrate) navigator.vibrate(0);
            const stream = await requestMicrophone();
            if (!stream || !activeCallSignal) return;

            document.getElementById('call-status').innerText = "Connecting secure bridge...";
            document.getElementById('accept-call-btn').classList.add('hidden');

            const call = peer.call(activeCallSignal.peerId, stream);
            handleActiveCall(call);
        }

        function handleActiveCall(call) {
            currentCall = call;
            document.getElementById('call-status').innerText = "In call (Connected)";
            
            // Call is bridged. Remove ring signal from Google Sheets.
            if(activeCallSignal) {
                postToSheet({ action: 'endCall', target: activeCallSignal.target || myName });
            }

            call.on('stream', remoteStream => {
                const remoteAudio = document.getElementById('remote-audio');
                if (remoteAudio) {
                    remoteAudio.srcObject = remoteStream;
                    remoteAudio.play().catch(e => console.warn("Audio autoplay blocked by browser policy:", e));
                }
            });

            call.on('close', endCallQuietly);
            call.on('error', endCallQuietly);
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Delete signals
            if(activeCallSignal) {
                postToSheet({ action: 'endCall', target: activeCallSignal.target || myName });
            }
            
            currentCall = null;
            localStream = null;
            endCallQuietly();
        }

        // Clean termination setup
        function endCallQuietly() {
            document.getElementById('call-overlay').classList.add('hidden');
            document.getElementById('call-overlay').classList.remove('active-ring');
            document.getElementById('accept-call-btn').classList.add('hidden');
            
            // Clear stream references
            const remoteAudio = document.getElementById('remote-audio');
            const localAudio = document.getElementById('local-audio');
            if (remoteAudio) remoteAudio.srcObject = null;
            if (localAudio) localAudio.srcObject = null;

            if(navigator.vibrate) navigator.vibrate(0);
        }
    </script>
</body>
</html>
